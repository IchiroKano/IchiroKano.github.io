<!DOCTYPE html>
<html lang="ja">
  <head>
    <title>Try to read google drive</title>
    <meta charset="utf-8" />
  </head>
  <body>
    <p>グーグルドライブから読んでみる</p>

    <!--サインインとサインアウトのボタンを作る-->
    <button id="authorize_button" style="display: none;">認証</button>
    <button id="signout_button" style="display: none;">サインアウト</button>

    <pre id="content" style="white-space: pre-wrap;"></pre>

    <script type="text/javascript">
      // 開発コンソールから払い出したIDとAPIキー
      var CLIENT_ID = '858740224698-d8oebssq0mlf76k83lqlie82k7551916.apps.googleusercontent.com';
      var API_KEY = '';

      // APIを使うための「API discovery doc URLs」の配列
      var DISCOVERY_DOCS = ["https://www.googleapis.com/discovery/v1/apis/drive/v3/rest"];

      // APIで要求された権限（空白で区切って複数設定できる）
      var SCOPES = 'https://www.googleapis.com/auth/drive.metadata.readonly';

      var authorizeButton = document.getElementById('authorize_button');
      var signoutButton = document.getElementById('signout_button');

      //　APIを実行する時、auth2ライブラリとAPIクライアントライブラリを呼ぶ
      function handleClientLoad() {
        gapi.load('client:auth2', initClient);
      }

      // APIクライアントライブラリを初期設定して、サインイン状態にする
      function initClient() {
        gapi.client.init({
          apiKey: API_KEY,
          clientId: CLIENT_ID,
          discoveryDocs: DISCOVERY_DOCS,
          scope: SCOPES
        }).then(function () {
          // サインイン状態の変更をリッスンする
          gapi.auth2.getAuthInstance().isSignedIn.listen(updateSigninStatus);

          // 初期のサインイン状態をハンドルする。ボタンに認証とサインアウトの機能を割り当て。
          updateSigninStatus(gapi.auth2.getAuthInstance().isSignedIn.get());
          authorizeButton.onclick = handleAuthClick;
          signoutButton.onclick = handleSignoutClick;
        }, function(error) {
          appendPre(JSON.stringify(error, null, 2));
        });
      }

      // サインイン状態を変更したとき呼ばれる。ボタンの表示ON/OFF
      function updateSigninStatus(isSignedIn) {
        if (isSignedIn) {
          authorizeButton.style.display = 'none';
          signoutButton.style.display = 'block';
          listFiles();
        } else {
          authorizeButton.style.display = 'block';
          signoutButton.style.display = 'none';
        }
      }

      // ボタンをクリックしたらサインインする。
      function handleAuthClick(event) {
        gapi.auth2.getAuthInstance().signIn();
      }

      // ボタンをクリックしたらサインアウトする。
      function handleSignoutClick(event) {
        gapi.auth2.getAuthInstance().signOut();
      }

      // テキストノードとして与えたメッセージを含むbodyに要素を追加する。API呼び出しの結果を表示する。
      // * @param {string} messageテキストが要素に置き換えられる。
      function appendPre(message) {
        var pre = document.getElementById('content');
        var textContent = document.createTextNode(message + '\n');
        pre.appendChild(textContent);
      }

      // ファイルを表示する
      function listFiles() {
        gapi.client.drive.files.list({
          'pageSize': 10,
          'fields': "nextPageToken, files(id, name)"
        }).then(function(response) {
          appendPre('Files:');
          var files = response.result.files;
          if (files && files.length > 0) {
            for (var i = 0; i < files.length; i++) {
              var file = files[i];
              appendPre(file.name + ' (' + file.id + ')');
            }
          } else {
            appendPre('No files found.');
          }
        });
      }

    </script>

    <script async defer src="https://apis.google.com/js/api.js"
      onload="this.onload=function(){};handleClientLoad()"
      onreadystatechange="if (this.readyState === 'complete') this.onload()">
    </script>
  </body>
</html>
